<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purchase Complete | Hot 'n Tasty Music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="realmusic.css" media="all" />
    <style>
      .success-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 80px 24px;
      }
      .success-container {
        max-width: 560px;
        width: 100%;
        text-align: center;
      }
      .success-icon {
        font-size: 64px;
        margin-bottom: 24px;
      }
      .success-title {
        font-size: 32px;
        font-weight: 700;
        color: var(--accent-gold);
        margin-bottom: 12px;
      }
      .success-message {
        font-size: 16px;
        color: var(--text-light);
        margin-bottom: 40px;
        opacity: 0.8;
      }
      .download-list {
        list-style: none;
        text-align: left;
        margin-bottom: 40px;
      }
      .download-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background-color: var(--bg-card);
        border: 2px solid var(--border-color);
        border-radius: 6px;
        padding: 14px 18px;
        margin-bottom: 8px;
      }
      .download-item-name {
        color: var(--text-light);
        font-size: 15px;
      }
      .download-item a {
        color: var(--accent-gold);
        text-decoration: none;
        font-weight: 700;
        font-size: 14px;
        padding: 6px 16px;
        border: 2px solid var(--accent-gold);
        border-radius: 6px;
        transition: background-color 0.2s ease, color 0.2s ease;
        white-space: nowrap;
      }
      .download-item a:hover {
        background-color: var(--accent-gold);
        color: var(--bg-primary);
      }
      .back-link {
        color: var(--accent-gold);
        text-decoration: none;
        font-size: 15px;
      }
      .back-link:hover {
        text-decoration: underline;
      }
      .loading-msg {
        color: var(--text-light);
        opacity: 0.6;
      }
      .error-msg {
        color: #e87272;
      }
      .bookmark-notice {
        margin-top: 24px;
        margin-bottom: 32px;
        padding: 16px 20px;
        background-color: var(--bg-card);
        border: 2px solid var(--border-color);
        border-radius: 6px;
        font-size: 14px;
        color: var(--text-light);
        line-height: 1.6;
      }
      .bookmark-notice strong {
        color: var(--accent-gold);
      }
    </style>
  </head>
  <body>
    <div class="success-page">
      <div class="success-container">
        <div class="success-icon">&#10003;</div>
        <h1 class="success-title">Thank You</h1>
        <p class="success-message" id="status-msg">Verifying your purchase...</p>
        <ul class="download-list" id="download-list"></ul>
        <div class="bookmark-notice" id="bookmark-notice" style="display:none">
          <strong>Bookmark this page</strong> to download again later. This is your unique download link — it won't work for anyone else.
        </div>
        <a href="/" class="back-link">&larr; Back to Hot 'n Tasty Music</a>
      </div>
    </div>
    <script>
      (async function() {
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get('session_id');
        const token = params.get('token');
        const statusMsg = document.getElementById('status-msg');
        const downloadList = document.getElementById('download-list');
        const bookmarkNotice = document.getElementById('bookmark-notice');

        if (!sessionId && !token) {
          statusMsg.textContent = 'No purchase found.';
          statusMsg.classList.add('error-msg');
          return;
        }

        try {
          let data;

          if (token) {
            // Returning customer with a download token
            const res = await fetch(`/api/redownload?token=${encodeURIComponent(token)}`);
            if (!res.ok) {
              const err = await res.json();
              throw new Error(err.error || 'Invalid download link');
            }
            data = await res.json();
          } else {
            // First visit after Stripe checkout
            const res = await fetch(`/api/download?session_id=${encodeURIComponent(sessionId)}`);
            if (!res.ok) {
              const err = await res.json();
              throw new Error(err.error || 'Verification failed');
            }
            data = await res.json();

            // Replace URL with the permanent token-based link
            if (data.token) {
              const tokenUrl = `${window.location.origin}/success.html?token=${data.token}`;
              window.history.replaceState({}, '', tokenUrl);
            }
          }

          statusMsg.textContent = 'Your music is ready to download.';
          bookmarkNotice.style.display = 'block';

          data.downloads.forEach(track => {
            const li = document.createElement('li');
            li.className = 'download-item';
            li.innerHTML = `
              <span class="download-item-name">${track.name}</span>
              <a href="${track.url}" download>Download</a>
            `;
            downloadList.appendChild(li);
          });
        } catch (err) {
          statusMsg.textContent = err.message;
          statusMsg.classList.add('error-msg');
        }
      })();
    </script>
  </body>
</html>
